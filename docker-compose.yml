services:
  autpixel:
    build: .
    container_name: autpixel
    restart: on-failure:3
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - HEADLESS=true
      - PROXY_ENABLED=0
      - BROWSER_IGNORE_CERT_ERRORS=0
      - GOOGLE_CAPTCHA_AUTO_SOLVE=0
    dns:
      - 1.1.1.1
      - 8.8.8.8
    dns_opt:
      - use-vc
    volumes:
      - ./logs:/app/logs
    # Resource limits for 2.5GB RAM / 2 CPU servers
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"
        reservations:
          memory: 512M
    shm_size: "512m"  # Shared memory for Chrome headless (needs more for JS injection)
